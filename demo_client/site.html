<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>FF Console Netflix Demo — Final</title>
<style>
  body{margin:0;font-family:Arial, sans-serif;background:#000;color:#fff;}
  .header{padding:20px 40px;display:flex;justify-content:space-between;align-items:center;
    background:rgba(0,0,0,0.8);position:fixed;top:0;width:100%;z-index:10;}
  .logo{font-size:32px;font-weight:bold;color:#e50914;}
  .status {font-size:14px;color:#ddd}
  .banner{height:50vh;background-size:cover;background-position:center;display:flex;align-items:flex-end;
    padding:50px;position:relative;overflow:hidden;transition:all .25s ease;}
  #hero-video{display:none;width:100%;height:100%;object-fit:cover;position:absolute;inset:0;z-index:1;}
  .banner-text{position:relative;z-index:2;}
  #premium-banner{display:none;padding:15px;background:gold;color:black;font-weight:bold;font-size:20px;text-align:center;}
  #beta-row{display:none;padding:20px;font-size:24px;background:#222;margin-top:20px;}
  .row{padding:20px 40px;}
  .thumbnails{display:flex;gap:16px;overflow-x:auto;}
  .thumbnails img{width:200px;border-radius:6px;transition:0.2s;}
  .thumbnails img:hover{transform:scale(1.08);}
  .beta-row{padding:20px 40px;}
  .thumbnail{display:flex;gap:22px;overflow-x:auto;}
  .thumbnail img{width:200px;border-radius:6px;transition:0.2s;}
  .thumbnail img:hover{transform:scale(1.08);}
  /* FESTIVE visual extras to make it obvious */
  .festive-snow { position:absolute; inset:0; pointer-events:none; z-index:3; opacity:0.9; }
  .festive-glow { box-shadow:0 0 40px rgba(255,215,0,0.35) inset; }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">NETFLIX</div>
    <div class="status" id="status">Loading flags...</div>
  </div>

  <div id="premium-banner">🔥 Premium UI Mode Enabled</div>
  <div class="banner" id="hero-banner" style="background-image: url('the-witcher-season-3840x2160-24258.jpg');">
    <video id="hero-video" muted loop preload="auto" playsinline>
      <source src="The Witcher.mp4" type="video/mp4">

      Your browser doesn't support the video tag.
    </video>

    <div class="banner-text">
      <h1>Featured Show</h1>
      <p>Experience dynamic UI controlled by your Feature Flag Console.</p>
    </div>

    <canvas id="festive-overlay" class="festive-snow" style="display:none;"></canvas>
  </div>

  <div id="beta-row">
    <h2>TOP 10</h2>
    <div class="thumbnail">
      <img src="Animal full movie.jpg" alt="">
      <img src="Fighter (2024).jpg" alt="">
      <img src="Oppenheimer.jpg" alt="">
      <img src="poster.jpg" alt="">
      <img src="RRR_라이즈 로어 리볼트.jpg" alt="">
      <img src="The Dark Knight.jpg" alt="">
    </div>
  </div>
  </div>
     

  <div class="row">
    <h2>Trending Now</h2>
    <div class="thumbnails">
      <img src="you.jpg" alt="">
      <img src="the_platform.jpg" alt="">
      <img src="Peaky Blinders Poster.jpg" alt="">
      <img src="SWEET HOME (Poster).jpg" alt="">
      <img src="Narcos Movie poster Design 🎥.jpg" alt="">
      <img src="la casa de papel.jpg" alt="">
    </div>
  </div>

<script>
const token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJfaWQiOiI2OTE5OGZkOGZiYzBmYThhYzA1MWM0NzkiLCJlbWFpbCI6ImV4YW1wbGVAZ21haWwuY29tIiwicm9sZSI6InZpZXdlciIsImlhdCI6MTc2MzMxMzg5OSwiZXhwIjoxNzYzOTE4Njk5fQ.SGQvS4LH1QD7R6DYvYWXN6vl5PiLxcIlbZ7FHWw4-3I ";

/* Cached elements */
const statusEl = document.getElementById('status');
const heroBanner = document.getElementById('hero-banner');
const heroVideo = document.getElementById('hero-video');
const premiumBanner = document.getElementById('premium-banner');
const betaRow = document.getElementById('beta-row');
const festiveCanvas = document.getElementById('festive-overlay');

/* Utility: set status text and console log */
function setStatus(text) {
  statusEl.innerText = text;
  console.log('[STATUS]', text);
}

/* Load flags from your backend */
async function loadFeatureFlags(){
  setStatus('Loading flags...');
  try{
    const res = await fetch("http://localhost:5001/api/features", {
      headers: { Authorization: "Bearer " + token }
    });
    if(!res.ok) {
      const txt = await res.text();
      console.error('Flags fetch failed:', res.status, txt);
      setStatus('Flags fetch failed: ' + res.status);
      return;
    }
    const features = await res.json();
    console.log('Flags fetched:', features);
    const flags = {};
    (features||[]).forEach(f => flags[f.name] = f.enabled);
    applyFlags(flags);
    setStatus('Flags Loaded ✓');
  }catch(err){
    console.error('Error loading flags:', err);
    setStatus('Failed to load flags (see console)');
  }
}

function applyFlags(flags){
  console.log('applyFlags:', flags);
  if(flags.festiveMode){
    document.body.style.background = '#111';
    document.querySelector('.header').style.boxShadow = '0 0 30px red';
    heroBanner.style.border = '5px solid gold';
    heroBanner.classList.add('festive-glow');
    festiveCanvas.style.display = 'block';
    startFestiveSnow();
  } else {
    document.body.style.background = '#000';
    document.querySelector('.header').style.boxShadow = 'none';
    heroBanner.style.border = 'none';
    heroBanner.classList.remove('festive-glow');
    stopFestiveSnow();
    festiveCanvas.style.display = 'none';
  }

  premiumBanner.style.display = flags.premiumBanner ? 'block' : 'none';

  betaRow.style.display = flags.betaFeature ? 'block' : 'none';

  window.autoplayEnabled = !!flags.autoplayBanner;
  updateAutoplay();
}

function updateAutoplay(){
  const image = 'the-witcher-season-3840x2160-24258.jpg';
  if(window.autoplayEnabled){

    heroVideo.style.display = 'block';

    heroBanner.style.backgroundImage = 'none';
    const playPromise = heroVideo.play();
    if (playPromise !== undefined) {
      playPromise.then(() => {
        console.log('Video playing (autoplay ON)');
        setStatus('Autoplay ON — Video playing');
      }).catch(err => {
        console.warn('Autoplay failed to start:', err);
        
        heroVideo.style.display = 'none';
        heroBanner.style.backgroundImage = `url('${image}')`;
        setStatus('Autoplay failed (video blocked).');
      });
    }
  } else {

    try { heroVideo.pause(); } catch(e){}
    heroVideo.currentTime = 0;
    heroVideo.style.display = 'none';
    heroBanner.style.backgroundImage = `url('${image}')`;
    setStatus('Autoplay OFF');
  }
}

heroVideo.addEventListener('error', (e) => {
  console.error('Video error event:', e);
  heroVideo.style.display = 'none';
  heroBanner.style.backgroundImage = "url('the-witcher-season-3840x2160-24258.jpg')";
  setStatus('Video failed to load (check path).');
});

heroVideo.addEventListener('ended', () => {
  console.log('video ended');

});

let snowAnim = null;
function startFestiveSnow(){
  const c = festiveCanvas;
  const ctx = c.getContext('2d');
  function resize(){
    c.width = heroBanner.clientWidth;
    c.height = heroBanner.clientHeight;
    c.style.left = heroBanner.offsetLeft + 'px';
    c.style.top = heroBanner.offsetTop + 'px';
  }
  resize();
  window.addEventListener('resize', resize);
  const flakes = Array.from({length: 40}, () => ({
    x: Math.random()*c.width,
    y: Math.random()*c.height,
    r: 1+Math.random()*3,
    d: Math.random()*1
  }));
  function frame(){
    ctx.clearRect(0,0,c.width,c.height);
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    flakes.forEach((f,i) => {
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
      ctx.fill();
      f.y += 0.5 + f.d;
      if(f.y > c.height) { f.y = -10; f.x = Math.random()*c.width; }
    });
    snowAnim = requestAnimationFrame(frame);
  }
  if(!snowAnim) frame();
}
function stopFestiveSnow(){
  if(snowAnim){ cancelAnimationFrame(snowAnim); snowAnim = null; }
}

/* Debug helper: show flags and video element state quickly */
function debugState(){
  console.log('AUTOPLAY FLAG:', window.autoplayEnabled);
  console.log('Video element:', heroVideo);
}

loadFeatureFlags();
window.debugState = debugState;
</script>
</body>
</html>
